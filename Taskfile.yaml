version: '3'

tasks:
  run:
    desc: Run as-is
    cmds:
      - go run ./... {{.CLI_ARGS}}

  example:
    desc: Run example case (dummy test file)
    aliases: [ ex ]
    cmds:
      - 'printf "chore: dummy message\n\nYou can edit this.\n" > MSG'
      - task: run
        vars: { CLI_ARGS: MSG message }
      - cat MSG
      - rm MSG

  test:
    desc: Run all Go tests
    cmds:
      - go test ./...

  clean:
    desc: Remove built artifacts
    cmds:
      - rm -rf .build

  build:
    desc: Build the committed binary into .build/committed
    cmds:
      - mkdir -p .build
      - go build -o .build/committed .

  install:
    desc: Build and install from .build/committed
    deps:
      - build
    cmds:
      - cp .build/committed $(go env GOPATH)/bin/committed

  lint:
    desc: Run go vet and go test as a lightweight lint step
    cmds:
      - go vet ./...
      - go test ./...
